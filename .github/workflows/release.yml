name: Build & Release 🍺

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build TapHouse
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build App
        run: |
          mkdir -p build release
          xcodebuild -workspace Pint.xcworkspace -scheme Pint -configuration Release -archivePath build/Pint.xcarchive archive
          xcodebuild -exportArchive -archivePath build/Pint.xcarchive -exportPath release -exportOptionsPlist .github/exportOptions.plist
          
          APP_PATH=$(find build -name "Pint.app" -type d | head -1)
          if [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" release/Pint.app
          fi
          
          cd release
          zip -r -y Pint.zip Pint.app
          echo "Archive created: $(ls -lh Pint.zip)"

      - name: Get version from tag
        id: version
        run: echo "VERSION=$(echo $GITHUB_REF | cut -d / -f 3)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Pint ${{ steps.version.outputs.VERSION }}
          body: |
            ## Pint ${{ steps.version.outputs.VERSION }}
            
            1. Download `Pint.zip` below
            2. Unzip and drag `Pint.app` to `/Applications`
            
            ---
            *Built with ❤️ for Homebrew users*
          draft: false
          prerelease: false
          files: release/Pint.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
