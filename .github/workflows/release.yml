name: Build & Release 🍺

on:
  push:
    tags:
      - 'v*'

# Queue releases; never run two in parallel (prevents appcast race condition)
concurrency:
  group: release
  cancel-in-progress: false

jobs:

  # ── Job 1: Build & sign ────────────────────────────────────────────────────
  build:
    name: Build & Sign
    runs-on: macos-15

    outputs:
      tag:        ${{ steps.version.outputs.TAG }}
      version:    ${{ steps.version.outputs.VERSION }}
      build:      ${{ steps.version.outputs.BUILD }}
      dmg_name:   ${{ steps.dmg.outputs.DMG_NAME }}
      dmg_sha256: ${{ steps.dmg.outputs.DMG_SHA256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache derived data
        uses: actions/cache@v4
        with:
          path: build
          key: derived-data-${{ hashFiles('**/*.swift', 'Pint.xcodeproj/project.pbxproj') }}
          restore-keys: derived-data-

      # ── Code Signing ──────────────────────────────────────────────────────
      # Requires these GitHub secrets:
      #   DEVELOPER_ID_CERT_BASE64   – base64-encoded Developer ID Application .p12
      #   DEVELOPER_ID_CERT_PASSWORD – password for the .p12
      #   KEYCHAIN_PASSWORD          – any strong random string (just for CI keychain)

      - name: Import Developer ID certificate
        env:
          CERT_B64:  ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASS: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KC_PASS:   ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 --decode -o certificate.p12
          security create-keychain -p "$KC_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KC_PASS" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERT_PASS" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KC_PASS" build.keychain
          rm -f certificate.p12

      - name: Get version info
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"           # e.g. v1.2.0
          VERSION="${TAG#v}"                        # e.g. 1.2.0
          BUILD=$(grep -o 'CURRENT_PROJECT_VERSION = [0-9]*' \
            Pint.xcodeproj/project.pbxproj | head -1 | awk '{print $3}')
          echo "TAG=$TAG"         >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD=$BUILD"     >> $GITHUB_OUTPUT

      - name: Build (signed, universal)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -project Pint.xcodeproj \
            -scheme Pint \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            ONLY_ACTIVE_ARCH=NO \
            REPO_OWNER=${{ github.repository_owner }} \
            build

      # Re-sign Sparkle's nested binaries with our Developer ID.
      # Sparkle ships pre-signed with its own cert; Apple requires every binary
      # inside the app to bear the *distributor's* Developer ID for notarization.
      # Order is inside-out: deepest items first, app bundle last.
      - name: Re-sign Sparkle nested components
        run: |
          APP_PATH="build/Build/Products/Release/Pint.app"
          SPARKLE_B="$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B"

          for ITEM in \
            "$SPARKLE_B/XPCServices/Downloader.xpc" \
            "$SPARKLE_B/XPCServices/Installer.xpc" \
            "$SPARKLE_B/Updater.app" \
            "$SPARKLE_B/Autoupdate" \
            "$SPARKLE_B/Sparkle" \
            "$APP_PATH/Contents/Frameworks/Sparkle.framework"; do
            codesign --force --sign "Developer ID Application" \
              --options runtime --timestamp "$ITEM"
          done

          # Re-seal the top-level app bundle after modifying nested content
          codesign --force --sign "Developer ID Application" \
            --options runtime --timestamp \
            --entitlements Pint/Pint.entitlements \
            "$APP_PATH"

      - name: Verify code signing
        run: |
          APP_PATH="build/Build/Products/Release/Pint.app"
          echo "=== Bundle verification ==="
          codesign --verify --deep --strict "$APP_PATH"
          echo "=== Authority + runtime + entitlements ==="
          codesign --display --verbose=4 "$APP_PATH" 2>&1 | \
            grep -E "Authority|flags=|Entitlements"

      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_PATH="build/Build/Products/Release/Pint.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Pint.app not found at $APP_PATH" >&2
            exit 1
          fi
          echo "App at: $APP_PATH"
          mkdir -p release

          # Temporary read-write DMG
          hdiutil create -volname "Pint" \
            -srcfolder "$APP_PATH" \
            -ov -format UDRW \
            -fs HFS+ \
            "release/Pint-rw.dmg"

          # Convert to compressed read-only
          hdiutil convert "release/Pint-rw.dmg" \
            -format UDZO \
            -o "release/Pint-${VERSION}.dmg"
          rm "release/Pint-rw.dmg"

          DMG_SHA256=$(shasum -a 256 "release/Pint-${VERSION}.dmg" | awk '{print $1}')
          echo "DMG_NAME=Pint-${VERSION}.dmg"   >> $GITHUB_OUTPUT
          echo "DMG_SHA256=$DMG_SHA256"          >> $GITHUB_OUTPUT
          echo "DMG created: $(ls -lh release/Pint-${VERSION}.dmg)"
          echo "SHA-256: $DMG_SHA256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pint-dmg
          path: release/${{ steps.dmg.outputs.DMG_NAME }}
          retention-days: 1

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Delete build keychain
        if: always()
        run: security delete-keychain build.keychain || true

  # ── Job 2: Notarize & Sparkle-sign ────────────────────────────────────────
  notarize:
    name: Notarize & Sparkle-Sign
    runs-on: macos-15
    needs: build

    outputs:
      sparkle_sig: ${{ steps.sparkle_sign.outputs.SPARKLE_SIG }}
      dmg_size:    ${{ steps.sparkle_sign.outputs.DMG_SIZE }}
      dmg_sha256:  ${{ steps.staple.outputs.DMG_SHA256 }}

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: Pint-dmg
          path: release

      - name: Locate DMG
        id: dmg
        run: |
          DMG=$(find release -name "*.dmg" | head -1)
          echo "DMG_PATH=$DMG" >> $GITHUB_OUTPUT

      # ── Notarization ───────────────────────────────────────────────────────
      # Requires these GitHub secrets:
      #   APPLE_ID              – your Apple ID email
      #   APPLE_ID_APP_PASSWORD – app-specific password (appleid.apple.com)
      #   APPLE_TEAM_ID         – 10-char Team ID (e.g. Y3RSAVXTDA)

      - name: Notarize DMG
        env:
          APPLE_ID:              ${{ secrets.APPLE_ID }}
          APPLE_ID_APP_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # --output-format json lets us assert status == "Accepted" explicitly.
          # notarytool can exit 0 with status "Invalid", which produces no ticket
          # and causes stapler to fail with "Record not found" indefinitely.
          xcrun notarytool submit "${{ steps.dmg.outputs.DMG_PATH }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json | tee notarize_result.json

          STATUS=$(python3 -c "import json; print(json.load(open('notarize_result.json'))['status'])")
          SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('notarize_result.json'))['id'])")

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            echo "Fetching Apple's rejection log for submission $SUBMISSION_ID..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          echo "Notarization accepted (submission $SUBMISSION_ID)"

      - name: Staple notarization ticket
        id: staple
        run: |
          # notarytool --wait means Apple finished processing, but the CloudKit
          # ticket still needs time to propagate before stapler can find it.
          # Retry up to 10 times × 60s = ~10 min, which covers Apple's worst case.
          echo "Waiting for CloudKit propagation..."
          sleep 60

          for i in {1..10}; do
            xcrun stapler staple "${{ steps.dmg.outputs.DMG_PATH }}" && break || {
              if [ $i -lt 10 ]; then
                echo "Staple attempt $i/10 failed (Record not found), retrying in 60s..."
                sleep 60
              else
                echo "Staple failed after 10 attempts (~10 min). CloudKit may be degraded."
                exit 1
              fi
            }
          done

          xcrun stapler validate "${{ steps.dmg.outputs.DMG_PATH }}"

          # Recompute hash after stapling — the ticket is embedded in the DMG,
          # so the pre-staple hash from the build job is no longer valid
          DMG_SHA256=$(shasum -a 256 "${{ steps.dmg.outputs.DMG_PATH }}" | awk '{print $1}')
          echo "DMG_SHA256=$DMG_SHA256" >> $GITHUB_OUTPUT
          echo "SHA-256 (post-staple): $DMG_SHA256"

      # ── Sparkle EdDSA signing ──────────────────────────────────────────────
      # Requires this GitHub secret:
      #   SPARKLE_PRIVATE_KEY – contents of sparkle_private_key (from generate_keys)
      #
      # To generate keys locally (one-time setup):
      #   brew install sparkle
      #   /opt/homebrew/opt/sparkle/bin/generate_keys
      # Copy the public key into Xcode build settings as INFOPLIST_KEY_SUPublicEDKey.
      # Store the private key in the SPARKLE_PRIVATE_KEY GitHub secret.

      - name: Cache Sparkle tools
        uses: actions/cache@v4
        with:
          path: sparkle_tools
          key: sparkle-2.9.0

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.9.0"
          if [ ! -f "sparkle_tools/bin/sign_update" ] && ! find sparkle_tools -name sign_update -quit 2>/dev/null | grep -q .; then
            curl -L --fail \
              "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
              -o sparkle.tar.xz
            mkdir -p sparkle_tools
            tar -xf sparkle.tar.xz -C sparkle_tools
          fi
          echo "sign_update path: $(find sparkle_tools -name sign_update)"

      - name: Sign update with Sparkle EdDSA
        id: sparkle_sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=$(find sparkle_tools -name sign_update | head -1)
          chmod +x "$SIGN_UPDATE"

          DMG_PATH="${{ steps.dmg.outputs.DMG_PATH }}"
          DMG_SIZE=$(wc -c < "$DMG_PATH" | tr -d ' ')

          # Write the private key to a temp file without a trailing newline
          KEYFILE=$(mktemp)
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEYFILE"

          SIGNATURE=$("$SIGN_UPDATE" "$DMG_PATH" --ed-key-file "$KEYFILE")
          rm -f "$KEYFILE"

          echo "SPARKLE_SIG=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "DMG_SIZE=$DMG_SIZE"     >> $GITHUB_OUTPUT
          echo "Signature: $SIGNATURE"

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v4
        with:
          name: Pint-dmg-notarized
          path: release/${{ needs.build.outputs.dmg_name }}
          retention-days: 1

  # ── Job 3: Update appcast & publish GitHub Release ─────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest   # no macOS needed here — 10× cheaper runner
    needs: [build, notarize]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # shallow clone is sufficient for a single-file commit

      - name: Download notarized DMG
        uses: actions/download-artifact@v4
        with:
          name: Pint-dmg-notarized
          path: release

      - name: Locate and verify DMG integrity
        id: dmg
        run: |
          DMG=$(find release -name "*.dmg" | head -1)
          echo "DMG_PATH=$DMG" >> $GITHUB_OUTPUT
          echo "${{ needs.notarize.outputs.dmg_sha256 }}  $DMG" | shasum -a 256 --check

      # ── Update appcast.xml ────────────────────────────────────────────────

      - name: Update appcast.xml
        env:
          VERSION:     ${{ needs.build.outputs.version }}
          BUILD:       ${{ needs.build.outputs.build }}
          TAG:         ${{ needs.build.outputs.tag }}
          SPARKLE_SIG: ${{ needs.notarize.outputs.sparkle_sig }}
          DMG_SIZE:    ${{ needs.notarize.outputs.dmg_size }}
        run: |
          python3 - <<'PYEOF'
          import os
          from datetime import datetime, timezone

          version     = os.environ['VERSION']
          build       = os.environ['BUILD']
          tag         = os.environ['TAG']
          sparkle_sig = os.environ['SPARKLE_SIG']
          dmg_size    = os.environ['DMG_SIZE']
          repo        = os.environ.get('GITHUB_REPOSITORY', 'Pint')
          owner       = repo.split('/')[0]

          pubdate     = datetime.now(timezone.utc).strftime("%a, %d %b %Y %H:%M:%S +0000")
          dmg_url     = f"https://github.com/{repo}/releases/download/{tag}/Pint-{version}.dmg"
          appcast_url = f"https://{owner}.github.io/Pint/appcast.xml"

          new_item = f"""    <item>
                <title>Version {version}</title>
                <sparkle:version>{build}</sparkle:version>
                <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                <pubDate>{pubdate}</pubDate>
                <enclosure
                  url="{dmg_url}"
                  {sparkle_sig}
                  length="{dmg_size}"
                  type="application/octet-stream"
                />
              </item>"""

          with open('docs/appcast.xml', 'r') as f:
              content = f.read()

          new_block = f"{new_item}\n    <!-- APPCAST_ITEMS_PLACEHOLDER -->"

          # Insert the new item
          if '<!-- APPCAST_ITEMS_PLACEHOLDER -->' not in content:
              raise RuntimeError("APPCAST_ITEMS_PLACEHOLDER not found — item was not inserted")
          content = content.replace('<!-- APPCAST_ITEMS_PLACEHOLDER -->', new_block)

          # Update the <link> template if needed
          content = content.replace('https://REPLACE_WITH_OWNER.github.io/Pint/appcast.xml', appcast_url)

          # Validate XML is still well-formed before writing.
          # Must encode to bytes first — ET.fromstring rejects the encoding="utf-8"
          # declaration when given a str (already decoded); bytes form is correct.
          import xml.etree.ElementTree as ET
          ET.fromstring(content.encode('utf-8'))

          with open('docs/appcast.xml', 'w') as f:
              f.write(content)

          print(f"appcast.xml updated for version {version}")
          PYEOF

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.event.repository.default_branch }}
          git add docs/appcast.xml
          git commit -m "chore: update appcast.xml for ${{ needs.build.outputs.tag }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pint ${{ needs.build.outputs.tag }}
          body: |
            ## Pint ${{ needs.build.outputs.tag }}

            ### Installation
            1. Download `Pint-${{ needs.build.outputs.version }}.dmg` below
            2. Open the DMG and drag `Pint.app` to `/Applications`
            3. Launch — no "right-click → Open" required (notarized by Apple)

            ### Auto-updates
            Pint will notify you automatically when a new version is available
            via Sparkle. Use **Pint → Check for Updates…** to check manually.

            > **Requires:** macOS 15.0 (Sequoia) or later + [Homebrew](https://brew.sh)

            See [CHANGELOG.md](CHANGELOG.md) for full release notes.
          files: ${{ steps.dmg.outputs.DMG_PATH }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
