name: Build & Release 🍺

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Pint
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild -project Pint.xcodeproj \
            -scheme Pint \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build
      - name: Package
        run: |
          APP_PATH=$(find build -name "Pint.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          # Create output directory
          mkdir -p release
          
          # Copy app bundle
          cp -R "$APP_PATH" release/Pint.app
          
          # Create zip
          cd release
          zip -r -y Pint.zip Pint.app
          
          echo "Archive created: $(ls -lh Pint.zip)"
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pint ${{ steps.version.outputs.VERSION }}
          body: |
            ## Pint ${{ steps.version.outputs.VERSION }}
            
            ### Installation
            1. Download `Pint.zip` below
            2. Unzip and drag `Pint.app` to `/Applications`
            3. Right-click → **Open** (first time only)
            
            > **Requires:** macOS 14.0 (Sonoma) or later + [Homebrew](https://brew.sh)
            
            See [CHANGELOG.md](CHANGELOG.md) for full release notes.
          files: release/Pint.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}